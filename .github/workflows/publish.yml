name: Publish release

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-release
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run checks
        run: npm run check

      - name: Read version
        id: version
        shell: bash
        run: |
          VERSION=$(sed -n 's#^// @version[[:space:]]*##p' chaoxing-quiz-tool.user.js | head -n 1)
          if [ -z "$VERSION" ]; then
            echo "Unable to read userscript version."
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Prepare release tag and asset
        shell: bash
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          git fetch --tags --force

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            TAG_VERSION=$(git show "$TAG:chaoxing-quiz-tool.user.js" | sed -n 's#^// @version[[:space:]]*##p' | head -n 1)
            if [ "v${TAG_VERSION}" != "$TAG" ]; then
              echo "Existing tag $TAG contains userscript version $TAG_VERSION."
              exit 1
            fi
            echo "Using existing tag $TAG."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "$TAG" -m "Release $TAG"
            git push origin "$TAG"
          fi

          mkdir -p release-assets
          git show "$TAG:chaoxing-quiz-tool.user.js" > release-assets/chaoxing-quiz-tool.user.js

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" release-assets/chaoxing-quiz-tool.user.js --clobber
            echo "Updated existing release $TAG."
          else
            gh release create "$TAG" \
              release-assets/chaoxing-quiz-tool.user.js \
              --title "$TAG" \
              --generate-notes
          fi
