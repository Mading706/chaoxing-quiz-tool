name: Publish release

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-release
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run checks
        run: npm run check

      - name: Read version
        id: version
        shell: bash
        run: |
          VERSION=$(sed -n 's#^// @version[[:space:]]*##p' chaoxing-quiz-tool.user.js | head -n 1)
          if [ -z "$VERSION" ]; then
            echo "Unable to read userscript version."
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create tag when missing
        shell: bash
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          git fetch --tags --force
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            TAG_COMMIT=$(git rev-list -n 1 "$TAG")
            if [ "$TAG_COMMIT" != "$GITHUB_SHA" ]; then
              echo "Tag $TAG already points to $TAG_COMMIT, not current commit $GITHUB_SHA."
              exit 1
            fi
            echo "Tag $TAG already points to the current commit."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "$TAG" -m "Release $TAG"
            git push origin "$TAG"
          fi

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" chaoxing-quiz-tool.user.js --clobber
            echo "Updated existing release $TAG."
          else
            gh release create "$TAG" \
              chaoxing-quiz-tool.user.js \
              --title "$TAG" \
              --generate-notes
          fi
