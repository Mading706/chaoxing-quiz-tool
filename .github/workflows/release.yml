name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run checks
        run: npm run check

      - name: Verify tag matches userscript version
        shell: bash
        run: |
          VERSION=$(sed -n 's#^// @version[[:space:]]*##p' chaoxing-quiz-tool.user.js | head -n 1)
          if [ "v${VERSION}" != "${GITHUB_REF_NAME}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match userscript version ${VERSION}."
            exit 1
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            chaoxing-quiz-tool.user.js \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes
