name: Bug 报告
description: 报告解析、显示或导出异常
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        提交前请删除姓名、学号、课程名称、账号、Cookie、Token 和 API 密钥等敏感信息。
  - type: input
    id: version
    attributes:
      label: 脚本版本
      placeholder: 例如 1.46.0
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: 浏览器与用户脚本管理器
      placeholder: 例如 Chrome 149 + Tampermonkey 5.x
    validations:
      required: true
  - type: dropdown
    id: page
    attributes:
      label: 页面类型
      options:
        - 普通作业或考试详情
        - 随堂练习题目页
        - 随堂练习统计或答案详情
        - 其他学习通页面
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 请逐步说明操作过程。
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 预期结果
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际结果与控制台报错
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: 隐私确认
      options:
        - label: 我已对截图、日志和页面内容进行脱敏。
          required: true
